# ─────────────────────────────────────────────────────────────────────────────
# QuizMaster Pro — Render deployment (single service: API + React SPA)
#
# The Express API server serves the built React frontend as static files.
# Everything runs under one URL — no CORS configuration needed.
#
# HOW TO DEPLOY:
#   1. Push this repo to GitHub
#   2. Go to dashboard.render.com → New → Web Service → connect your repo
#   3. Render auto-detects this render.yaml
#   4. Add the two "sync: false" env vars manually in the Render dashboard:
#        DATABASE_URL  — your PostgreSQL connection string
#        JWT_SECRET    — any long random string (min 32 chars)
#   5. Click Deploy
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: quizmaster-pro
    runtime: node
    region: oregon
    plan: free
    rootDir: .

    # Install pnpm, install deps, push DB schema, build frontend then API server
    buildCommand: >-
      npm install -g pnpm@10 &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @workspace/db run push &&
      NODE_ENV=production pnpm --filter @workspace/mcq-platform run build:prod &&
      pnpm --filter @workspace/api-server run build

    # Start the Express server (it serves both /api/* and the React SPA)
    startCommand: node artifacts/api-server/dist/index.mjs

    healthCheckPath: /api/healthz

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # Set this in the Render dashboard — your PostgreSQL connection string.
      # You can use Render's free PostgreSQL (New → PostgreSQL) or any external DB.
      - key: DATABASE_URL
        sync: false

      # Set this in the Render dashboard — any long random string (min 32 chars).
      # Example: openssl rand -hex 32
      - key: JWT_SECRET
        sync: false

      # Optional: override the default admin credentials created on first boot.
      # If not set, defaults are: admin@example.com / Admin123!
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        value: Admin123!

# ─── Free PostgreSQL database (optional — delete if using an external DB) ────
databases:
  - name: quizmaster-db
    plan: free
    region: oregon
